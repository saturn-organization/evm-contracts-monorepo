[profile.default]
solc           = "0.8.26"
src            = "contracts"
test           = "test"
out            = "out"
libs           = ["node_modules", "lib"]
optimizer      = true
optimizer_runs = 750
via_ir         = true

remappings = [
  "@layerzerolabs/=node_modules/@layerzerolabs/",
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
]

[profile.test]
via_ir = false
